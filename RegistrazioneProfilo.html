<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <link rel="stylesheet" href="Header-Footer.css">

  <style>
    @font-face {
      font-family: "scritta";
      src: url(font/scritta.ttf) format('woff');
    }

    @font-face {
      font-family: "FontPersonale";
      src: url(font/FontPersonale.ttf) format('woff');
    }

    body {
      margin: 0%;
      padding: 0%;
    }



    .box1 {

      height: 90vh;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      align-content: center;
      padding-top: 30px;
      padding-bottom: 30px;
    }

    .box2 {

      display: flex;
      flex-direction: column;
      align-items: center;
      width: 30%;
      height: 80vh;
      border: solid 1px;
      border-radius: 10px;
    }

    .titolo {

      display: flex;
      justify-content: center;
      padding-bottom: 20px;

    }

    .titolo h2 {

      font-family: "FontPersonale";
      color: #282626;
      font-size: 35px;

    }

    .form {

      width: 80%;
    }

    .dati {

      padding-bottom: 20px;
    }

    .dati input[type="text"] {

      height: 60px;
      width: 100%;
      border-radius: 5px;
      box-sizing: border-box;
      outline-color: blue;
      border: solid 1px grey;
      font-size: 20px;
      text-transform: capitalize;
      font-family: arial;
      color: #292828;
      padding: 10px;
    }

    .dati input[type="email"] {

      height: 60px;
      width: 100%;
      border-radius: 5px;
      box-sizing: border-box;
      outline-color: blue;
      border: solid 1px grey;
      font-size: 20px;
      text-transform: capitalize;
      font-family: arial;
      color: #292828;
      padding: 10px;
    }

    .dati input[type="password"] {

      height: 60px;
      width: 100%;
      border-radius: 5px;
      box-sizing: border-box;
      outline-color: blue;
      border: solid 1px grey;
      font-size: 20px;
      text-transform: capitalize;
      font-family: arial;
      color: #292828;
      padding: 10px;
    }

    .bottone {


      padding-top: 25px;
    }

    .bottone input[type="submit"] {

      height: 60px;
      width: 100%;
      background-color: #000000;
      color: white;
      font-size: 25px;
      font-family: Arial, Helvetica, sans-serif;
      border-radius: 10px;
      cursor: pointer;

    }

    .testo {

      padding-top: 20px;
      display: flex;
      justify-content: center;
    }

    .testo p {

      font-family: arial;
      font-size: 20px;
      color: #000;

    }

    .testo a {

      color: #161616;
      text-decoration: none;
      font-family: arial;
      position: relative;
      display: inline-block;

    }

    .testo a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 0%;
      height: 2px;
      background-color: #000;
      transition: width 0.3s ease;

    }

    .testo a:hover {

      color: blue;
    }

    .testo a:hover::after {
      width: 100%;
    }

    @media (max-width:900px) {

      .box2 {

        width: 90%;
      }


    }
  </style>
</head>

<body>

  <div id="Header"></div>

  <div class="box1">
    <div class="box2">

      <div class="titolo">
        <h2>Registrati</h2>
      </div>

      <form action="" method="post" class="form">


        <div class="dati">
          <label for="nome"></label>
          <input type="text" id="nome" placeholder="Nome">
        </div>

        <div class="dati">
          <label for="cognome"></label>
          <input type="text" id="cognome" placeholder="cognome">
        </div>


        <div class="dati">
          <label for="email"></label>
          <input type="email" id="email" placeholder="Email">
        </div>

        <div class="dati">
          <label for="password"></label>
          <input type="password" id="password" placeholder="Password">
        </div>

        <div class="bottone">
          <input type="submit" value="Registrati">
        </div>
      </form>



    </div>
  </div>

  <div id="Footer"></div>


  <div class="overlay" id="overlay"></div>
  

  <script src="Catalogo.js"></script>

  <script src="Carrelo.js"></script>

  <script src="Header.js"></script>

  <script src="Footer.js"></script>

  <script>



  </script>
</body>

</html>
